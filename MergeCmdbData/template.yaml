
AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  This stack will deploy athena federation query to get CMDB data and load them into a central bucket.
Metadata:
  AWS::ServerlessRepo::Application:
    Name: AutoOpsMergeCmdbData
    Description: This stack will deploy athena federation query to get AWS cm data and load them into a central bucket.
    Author: whuaning
    SpdxLicenseId: Apache-2.0
    ReadmeUrl: README.md
    SemanticVersion: 0.0.1
Parameters:
  AthenaCatalogName:
    Description: The name of athena catalog you used to deploy AthenaAwsCmdbConnector. This name must satisfy the pattern ^[a-z0-9-_]{1,64}$
    Type: String
    AllowedPattern: ^[a-z0-9-_]{1,64}$
    Default: aws-cmdb 
  CmdbBucket:
    Type: String
    Description: S3 bucket where you want to save CMDB data.
  AthenaResultBucket:
    Type: String
    Description: S3 bucket where store the query result of Athena.
Resources:
  MergeCmdbDataStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: state.asl.json
      DefinitionSubstitutions:
        LoadMergeCmdbDataInputFunctionArn: !GetAtt LoadMergeCmdbDataInputFunction.Arn
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: "cron(5 0 * * ? *)"
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref LoadMergeCmdbDataInputFunction 
        - LambdaInvokePolicy:
            FunctionName: !Ref AthenaCatalogName 
        - S3FullAccessPolicy:
            BucketName: !Ref CmdbBucket
        - S3FullAccessPolicy:
            BucketName: !Ref AthenaResultBucket 
        - AmazonAthenaFullAccess
        - AmazonS3FullAccess

  CmdbDataCatalog:
    Type: AWS::Athena::DataCatalog
    Properties: 
      Name: !Ref AthenaCatalogName 
      Parameters: 
        function: !Join [ ":" , [ "arn", "aws", "lambda", !Ref AWS::Region, !Ref AWS::AccountId, "function", !Ref AthenaCatalogName ] ] 
      Type: LAMBDA
  LoadMergeCmdbDataInputFunction:
    Type: 'AWS::Serverless::Function'
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.7
      Description: ''
      MemorySize: 128
      Timeout: 30
      CodeUri: LoadMergeCmdbDataInput
      Environment:
        Variables:
          CMDB_DATA_BUCKET: !Ref CmdbBucket
          ATHENA_RESULT_BUCKET: !Ref AthenaResultBucket
          AthenaDataCatalog: !Ref AthenaCatalogName

Outputs:
  MergeCmdbDataStateMachine:
    Description: "ARN of MergeCmdbDataStateMachine"
    Value: !Ref MergeCmdbDataStateMachine 
