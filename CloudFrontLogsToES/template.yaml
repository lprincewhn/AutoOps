AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Transform and deliver CloudFront standard logs in S3 bucket to Amazon ElasticSearch service. 
Metadata:
  AWS::ServerlessRepo::Application:
    Name: AutoOpsCloudFrontLogsToES 
    Description: Transform and deliver CloudFront standard logs in S3 bucket to Amazon ElasticSearch service.
    Author: whuaning
    SpdxLicenseId: Apache-2.0
    ReadmeUrl: README.md
    SemanticVersion: 0.0.1
Resources:
  CloudFrontLogTransformFunction:
    Type: 'AWS::Serverless::Function'
    Properties:
      Handler: app.lambda_handler
      Runtime: python3.7
      Description: ''
      MemorySize: 128
      Timeout: 30
      CodeUri: CloudFrontLogTransform
      Policies: 
        - S3ReadPolicy:
            BucketName: cloudfront-log-svhw-tech 
        - !Ref ESPostPolicy
      Events:
        S3BucketEvent:
          Type: S3
          Properties:
            Bucket: !Ref CloudFrontLogBucket
            Events:
              - 's3:ObjectCreated:*'
  ESPostPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties: 
      PolicyDocument: '{"Version": "2012-10-17","Statement": [{"Effect": "Allow","Action": ["es:ESHttpGet"],"Resource": ["arn:aws:es:*:*:domain/*/","arn:aws:es:*:*:domain/*/_cluster/settings","arn:aws:es:*:*:domain/*/_cat/indices"]},{"Effect": "Allow","Action": "es:ListDomainNames","Resource": "*"},{"Effect": "Allow","Action": ["es:DescribeElasticsearchDomain"],"Resource": ["arn:aws:es:*:*:domain/*"]},{"Effect": "Allow","Action": ["es:ESHttpPost","es:ESHttpGet"],"Resource": ["arn:aws:es:*:*:domain/*/_opendistro/_sql"]}]}' 
  CloudFrontLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: cloudfront-log-svhw-tech
Outputs:
  CloudFrontLogBucket:
    Description: "ARN of CloudFrontLogBucket"
    Value: !Ref CloudFrontLogBucket 
